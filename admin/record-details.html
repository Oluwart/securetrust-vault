<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vault Record Details</title>
<link rel="icon" type="image/png" href="../images/logo1.png" sizes="16x16">

<link rel="stylesheet" href="../css/dashboard.css">

<style>

.report-card{
max-width:1000px;
margin:auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.report-header{
text-align:center;
margin-bottom:30px;
}

.report-header h1{
color:#0f172a;
margin-bottom:5px;
}

.report-header p{
color:#666;
}

.section{
margin-top:25px;
}

.section h3{
margin-bottom:10px;
padding-bottom:10px;
border-bottom:2px solid #d4af37;
color:#0f172a;
}

.info-row{
margin-bottom:12px;
}

.info-row strong{
display:inline-block;
width:180px;
}

.status-badge{
display:inline-block;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

.in-storage{
background:#dcfce7;
color:#15803d;
}

.released{
background:#fee2e2;
color:#b91c1c;
}

.awaiting{
background:#fef3c7;
color:#b45309;
}

.verification{
background:#dbeafe;
color:#1d4ed8;
}

.actions{
margin-top:30px;
text-align:center;
}

.actions button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
margin:0 5px;
}

.print-btn{
background:#0ea5e9;
color:white;
}

.edit-btn{
background:#f59e0b;
color:white;
}

</style>

</head>

<body>

<div class="main-content">

<div id="recordDetails"></div>

</div>

<script type="module" src="../js/record-details.js"></script>
<script type="module" src="../js/auth-guard.js"></script>

</body>

</html>
