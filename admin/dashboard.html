<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STVI Dashboard</title>
<link rel="icon" type="image/png" href="../images/logo1.png" sizes="16x16">

<link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

<div class="sidebar">

    <h2>STVI</h2>

    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="add-record.html">Add Record</a></li>
        <li><a href="view-records.html">View Records</a></li>
        <li><a href="#" id="logoutBtn">Logout</a></li>
    </ul>

</div>

<div class="main-content">

    <div class="topbar">
        <h1>SecureTrust Vault International</h1>
    </div>

    <div class="cards">

        <div class="card">
            <h3>Total Assets</h3>
            <h2 id="totalAssets">0</h2>
        </div>

        <div class="card">
            <h3>In Storage</h3>
            <h2 id="inStorage">0</h2>
        </div>

        <div class="card">
            <h3>Released</h3>
            <h2 id="released">0</h2>
        </div>

        <div class="card">
            <h3>Total Weight</h3>
            <h2 id="totalWeight">0 kg</h2>
        </div>

    </div>

</div>

<script type="module" src="../js/dashboard.js"></script>
<script type="module" src="../js/auth-guard.js"></script>

</body>
</html>
