<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Vault Record</title>
<link rel="icon" type="image/png" href="../images/logo1.png" sizes="16x16">

<link rel="stylesheet" href="../css/dashboard.css">
</head>

<body>

<div class="sidebar">

    <h2>STVI</h2>

    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="add-record.html">Add Record</a></li>
        <li><a href="view-records.html">View Records</a></li>
    </ul>

</div>

<div class="main-content">

    <h1>Edit Vault Record</h1>

    <br>

    <form id="vaultForm">

        <input type="text" id="clientName" placeholder="Client Name" required>

        <input type="text" id="phoneNumber" placeholder="Phone Number" required>

        <input type="text" id="homeAddress" placeholder="Home Address" required>

        <input type="text" id="itemDescription" placeholder="Item Description" required>

        <input type="text" id="category" placeholder="Category" required>

        <input type="number" id="quantity" placeholder="Quantity" required>

        <input type="number" step="0.01" id="weight" placeholder="Weight" required>

        <input type="text" id="storageLocation" placeholder="Storage Location" required>

        <select id="status">

            <option>In Storage</option>
            <option>Under Verification</option>
            <option>Awaiting Release</option>
            <option>Released</option>

        </select>

        <textarea
        id="remarks"
        placeholder="Remarks"
        rows="5"></textarea>

        <input type="date" id="dateReceived">

        <button type="submit">
           Update Record
        </button>

    </form>

    <br>

    <p id="message"></p>

</div>

<script type="module" src="../js/edit-record.js"></script>
<script type="module" src="../js/auth-guard.js"></script>

</body>
</html>
